name: Publish Rust SDK

on:
  push:
    branches:
      - main
    paths:
      - "packages/sdk-rust/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspace: packages/sdk-rust

      - name: Check formatting
        run: cd packages/sdk-rust && cargo fmt --all -- --check

      - name: Run clippy
        run: cd packages/sdk-rust && cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cd packages/sdk-rust && cargo test

      - name: Publish to crates.io
        run: cd packages/sdk-rust && cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
