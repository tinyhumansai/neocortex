[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neocortex-dify"
version = "0.1.0"
description = "Dify integrations for TinyHumans memory API"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "tinyhumansai>=0.5",
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "dify-plugin"]

[tool.setuptools.packages.find]
include = ["neocortex_dify*"]

[tool.ruff]
line-length = 88
target-version = "py312"
