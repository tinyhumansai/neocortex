identity:
  name: query_memory_context
  author: Neocortex
  label:
    en_US: Query Memory Context
description:
  human:
    en_US: Query mirrored context endpoint for document-backed answers.
  llm:
    en_US: Query memory context via POST /v1/memory/queries.
parameters:
  - name: query
    type: string
    required: true
    label:
      en_US: Query
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
  - name: include_references
    type: boolean
    required: false
    label:
      en_US: Include References
  - name: max_chunks
    type: number
    required: false
    label:
      en_US: Max Chunks
  - name: document_ids_json
    type: string
    required: false
    label:
      en_US: Document IDs (JSON)
  - name: recall_only
    type: boolean
    required: false
    label:
      en_US: Recall Only
  - name: llm_query
    type: string
    required: false
    label:
      en_US: LLM Query

