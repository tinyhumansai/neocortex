identity:
  name: interact_memory
  author: Neocortex
  label:
    en_US: Interact Memory
description:
  human:
    en_US: Record an interaction between entities.
  llm:
    en_US: Record an interaction via POST /v1/memory/interact.
parameters:
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
  - name: entity_names_json
    type: string
    required: true
    label:
      en_US: Entity Names (JSON)
  - name: description
    type: string
    required: true
    label:
      en_US: Description
  - name: interaction_level
    type: string
    required: false
    label:
      en_US: Interaction Level
  - name: interaction_levels_json
    type: string
    required: false
    label:
      en_US: Interaction Levels (JSON)
  - name: timestamp
    type: number
    required: false
    label:
      en_US: Timestamp

