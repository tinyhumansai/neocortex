identity:
  name: sync_memory
  author: Neocortex
  label:
    en_US: Sync Memory
description:
  human:
    en_US: Sync OpenClaw-style memory files into Neocortex.
  llm:
    en_US: Sync memory files into Neocortex via /v1/memory/sync.
parameters:
  - name: workspace_id
    type: string
    required: true
    label:
      en_US: Workspace ID
  - name: agent_id
    type: string
    required: true
    label:
      en_US: Agent ID
  - name: files_json
    type: string
    required: true
    label:
      en_US: Files (JSON)
    human_description:
      en_US: JSON array of file objects.
    llm_description:
      en_US: JSON array of file objects.
  - name: source
    type: string
    required: false
    label:
      en_US: Source

