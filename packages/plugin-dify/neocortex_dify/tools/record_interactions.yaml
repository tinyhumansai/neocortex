identity:
  name: record_interactions
  author: Neocortex
  label:
    en_US: Record Interactions
description:
  human:
    en_US: Record interaction signals between entities.
  llm:
    en_US: Record interactions via POST /v1/memory/interactions.
parameters:
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
  - name: entity_names_json
    type: string
    required: true
    label:
      en_US: Entity Names (JSON)
  - name: description
    type: string
    required: false
    label:
      en_US: Description
  - name: interaction_level
    type: string
    required: false
    label:
      en_US: Interaction Level
  - name: interaction_levels_json
    type: string
    required: false
    label:
      en_US: Interaction Levels (JSON)
  - name: timestamp
    type: number
    required: false
    label:
      en_US: Timestamp

