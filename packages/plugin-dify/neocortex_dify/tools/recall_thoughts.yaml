identity:
  name: recall_thoughts
  author: Neocortex
  label:
    en_US: Recall Thoughts
description:
  human:
    en_US: Generate reflective thoughts from stored memory.
  llm:
    en_US: Generate reflective thoughts via POST /v1/memory/memories/thoughts.
parameters:
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
  - name: max_chunks
    type: number
    required: false
    label:
      en_US: Max Chunks
  - name: temperature
    type: number
    required: false
    label:
      en_US: Temperature
  - name: randomness_seed
    type: number
    required: false
    label:
      en_US: Randomness Seed
  - name: persist
    type: boolean
    required: false
    label:
      en_US: Persist
  - name: enable_prediction_check
    type: boolean
    required: false
    label:
      en_US: Enable Prediction Check
  - name: thought_prompt
    type: string
    required: false
    label:
      en_US: Thought Prompt

