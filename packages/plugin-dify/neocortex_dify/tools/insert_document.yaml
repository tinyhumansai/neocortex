identity:
  name: insert_document
  author: Neocortex
  label:
    en_US: Insert Document
description:
  human:
    en_US: Insert one document into Neocortex (document_id required).
  llm:
    en_US: Insert one document into Neocortex via /v1/memory/documents. document_id is required.
parameters:
  - name: title
    type: string
    required: true
    label:
      en_US: Title
  - name: content
    type: string
    required: true
    label:
      en_US: Content
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
  - name: document_id
    type: string
    required: true
    label:
      en_US: Document ID
  - name: source_type
    type: string
    required: false
    label:
      en_US: Source Type
  - name: metadata_json
    type: string
    required: false
    label:
      en_US: Metadata (JSON)
  - name: priority
    type: string
    required: false
    label:
      en_US: Priority
  - name: created_at
    type: number
    required: false
    label:
      en_US: Created At
  - name: updated_at
    type: number
    required: false
    label:
      en_US: Updated At

