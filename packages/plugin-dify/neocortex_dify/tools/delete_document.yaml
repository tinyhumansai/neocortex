identity:
  name: delete_document
  author: Neocortex
  label:
    en_US: Delete Document
description:
  human:
    en_US: Delete a document by document_id.
  llm:
    en_US: Delete a document via DELETE /v1/memory/documents/:documentId. Namespace is required.
parameters:
  - name: document_id
    type: string
    required: true
    label:
      en_US: Document ID
  - name: namespace
    type: string
    required: true
    label:
      en_US: Namespace

