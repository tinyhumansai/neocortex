[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neocortex-agno"
version = "0.1.0"
description = "Agno plugin for Neocortex-powered memories in Agno agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "agno>=2.0",
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[tool.setuptools.packages.find]
include = ["neocortex_agno*"]

[tool.ruff]
line-length = 88
target-version = "py39"
