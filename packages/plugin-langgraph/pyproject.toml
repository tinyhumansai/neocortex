[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neocortex-langgraph"
version = "0.1.0"
description = "LangGraph BaseStore integration for TinyHumans memory API"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "tinyhumansai>=0.5",
    "langgraph>=0.2",
    "langchain-core>=0.3",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]
examples = ["langchain-openai", "python-dotenv>=1.0"]

[tool.setuptools.packages.find]
include = ["neocortex_langgraph*"]

[tool.ruff]
line-length = 88
target-version = "py39"
