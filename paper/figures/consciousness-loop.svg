<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 424" width="800" height="424">
  <defs>
    <style type="text/css"><![CDATA[
      .box { fill: #f0fdf4; stroke: #334155; stroke-width: 2; }
      .box-ingest { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .noise-box { fill: #fff7ed; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5 4; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2.25; stroke-linejoin: round; stroke-linecap: round; marker-end: url(#arrowHead); }
      .title { font-family: sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .sub { font-family: sans-serif; font-size: 11px; fill: #475569; }
      .cap { font-family: sans-serif; font-size: 13px; font-weight: 600; fill: #475569; }
      .noise-title { font-family: sans-serif; font-size: 14px; font-weight: 700; fill: #9a3412; }
      .noise-sub { font-family: sans-serif; font-size: 11px; fill: #c2410c; }
      .world-box { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 4 3; }
      .world-title { font-family: sans-serif; font-size: 13px; font-weight: 700; fill: #1e40af; }
      .world-sub { font-family: sans-serif; font-size: 10px; fill: #1d4ed8; }
    ]]></style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="800" height="424" fill="#ffffff"/>

  <rect class="noise-box" x="362" y="22" width="196" height="48" rx="9"/>
  <text x="460" y="42" text-anchor="middle" class="noise-title">Noise (raw input)</text>
  <text x="460" y="58" text-anchor="middle" class="noise-sub">High-volume, redundant streams</text>

  <rect class="box-ingest" x="362" y="102" width="196" height="70" rx="9"/>
  <text x="460" y="124" text-anchor="middle" class="title">1. Ingest</text>
  <text x="460" y="142" text-anchor="middle" class="sub">Digest &amp; filter noisy data</text>
  <text x="460" y="158" text-anchor="middle" class="sub">Clean context to memory stores</text>

  <rect class="box" x="358" y="182" width="204" height="86" rx="9"/>
  <text x="460" y="206" text-anchor="middle" class="title">2. Recall &amp; thoughts</text>
  <text x="460" y="224" text-anchor="middle" class="sub">Interval recall, lightweight LLM</text>
  <text x="460" y="240" text-anchor="middle" class="sub">Thought production</text>

  <rect class="box" x="368" y="292" width="188" height="58" rx="9"/>
  <text x="462" y="316" text-anchor="middle" class="title">3. Action decision</text>
  <text x="462" y="334" text-anchor="middle" class="sub">External act or stay passive</text>

  <rect class="box" x="72" y="192" width="182" height="86" rx="9"/>
  <text x="163" y="216" text-anchor="middle" class="title">4. Memory update</text>
  <text x="163" y="234" text-anchor="middle" class="sub">Reweight recalled items</text>
  <text x="163" y="250" text-anchor="middle" class="sub">Persist new thoughts</text>

  <rect class="world-box" x="598" y="280" width="178" height="82" rx="9"/>
  <text x="687" y="306" text-anchor="middle" class="world-title">Real world</text>
  <text x="687" y="324" text-anchor="middle" class="world-sub">Emails sent, APIs called, UI updates,</text>
  <text x="687" y="338" text-anchor="middle" class="world-sub">reminders, tickets, ...</text>

  <path class="arrow" d="M 460 70 L 460 102"/>
  <path class="arrow" d="M 460 172 L 460 182"/>
  <path class="arrow" d="M 460 268 L 460 292"/>
  <path class="arrow" d="M 368 321 L 163 321 L 163 278"/>
  <path class="arrow" d="M 254 225 L 358 225"/>
  <path class="arrow" d="M 556 321 L 594 321"/>

  <text x="460" y="376" text-anchor="middle" class="cap">Consciousness loop</text>
</svg>
